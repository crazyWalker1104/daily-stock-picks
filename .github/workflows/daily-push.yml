name: 每日A股推荐推送

on:
  schedule:
    # 每个交易日 8:30 CST (0:30 UTC) — 盘前预跑
    # 每个交易日 9:35 CST (1:35 UTC) — 开盘后补充运行
    # GitHub Actions cron 使用 UTC 时间 (CST = UTC+8)
    - cron: '30 0 * * 1-5'
    - cron: '35 1 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，留空使用今天'
        required: false
        default: ''

permissions:
  contents: write

# 防止双 cron (8:30 + 9:35) 并发竞态
# cancel-in-progress: false → 第二个 run 排队等待
concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── Step 1: 检出 ──────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 2: Python 环境 ────────────────────────────────
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 3: 交易日检查 ────────────────────────────────
      - name: 检查交易日
        id: check_trading
        run: |
          python -c "
          from datetime import datetime
          try:
              import akshare as ak
              df = ak.tool_trade_date_hist_sina()
              today = datetime.now().strftime('%Y-%m-%d')
              trade_dates = df['trade_date'].astype(str).values
              recent_dates = [d for d in trade_dates if d.startswith(today[:7])]
              is_trading = today in recent_dates
              print(f'TRADING_DAY={str(is_trading).lower()}')
              print(f'DATE={today}')
          except Exception as e:
              print(f'交易日检查失败: {e}，默认执行')
              print('TRADING_DAY=true')
              print(f'DATE={datetime.now().strftime(\"%Y-%m-%d\")}')
          " > trading_check.txt
          cat trading_check.txt
          cat trading_check.txt >> $GITHUB_OUTPUT

      # ── Step 4: 运行推荐系统 ──────────────────────────────
      # continue-on-error: true → 管线异常不阻断后续 git push
      - name: 运行推荐系统
        id: pipeline
        continue-on-error: true
        if: steps.check_trading.outputs.TRADING_DAY == 'true' || github.event_name == 'workflow_dispatch'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WECHAT_SENDKEY: ${{ secrets.WECHAT_SENDKEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.main --date "${{ github.event.inputs.date }}" 2>&1
          else
            python -m src.main 2>&1
          fi
          echo "PIPELINE_EXIT=$?" >> pipeline_status.txt
          cat pipeline_status.txt

      # ── Step 5: 诊断日志 ────────────────────────────────────
      - name: 诊断日志
        if: (!cancelled())
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  诊断信息"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "交易日: ${{ steps.check_trading.outputs.TRADING_DAY }}"
          echo "日期:   ${{ steps.check_trading.outputs.DATE }}"
          echo "触发:   ${{ github.event_name }}"
          echo "管线结果: ${{ steps.pipeline.outcome }}"
          echo ""
          echo "--- output/ 目录 ---"
          ls -la output/ 2>/dev/null || echo "  (空)"
          echo ""
          echo "--- docs/ 目录 ---"
          ls -la docs/*.html 2>/dev/null || echo "  (空)"

      # ── Step 6: 提交网页报告 ───────────────────────────────
      # if: !cancelled() → 即使管线失败也尝试提交（有文件变更才实际提交）
      - name: 提交网页报告
        id: git_push
        if: (!cancelled()) && (steps.check_trading.outputs.TRADING_DAY == 'true' || github.event_name == 'workflow_dispatch')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/ output/ data/

          if git diff --cached --quiet && git diff --quiet; then
            echo "无变更，跳过提交"
            exit 0
          fi

          git commit -m "📊 更新每日A股速递 [${{ steps.check_trading.outputs.DATE }}]" || {
            echo "提交失败（可能无变更），跳过"
            exit 0
          }

          # 带指数退避的重试推送（最多 5 次）
          for i in 1 2 3 4 5; do
            git fetch origin main

            if git rebase origin/main 2>/dev/null; then
              if git push origin main; then
                echo "✅ 推送成功 (attempt $i)"
                exit 0
              fi
            else
              git rebase --abort 2>/dev/null || true
              git reset --soft origin/main
              git add docs/ output/ data/
              git commit -m "📊 更新每日A股速递 [${{ steps.check_trading.outputs.DATE }}]" || true
              if git push origin main; then
                echo "✅ 推送成功 (reset 方式, attempt $i)"
                exit 0
              fi
            fi

            if [ $i -lt 5 ]; then
              WAIT=$((i * 10))
              echo "⏳ 推送失败，${WAIT}s 后重试 ($i/5)..."
              sleep $WAIT
            fi
          done

          echo "❌ 推送最终失败（已重试 5 次）"
          exit 1

      # ── Step 7: 失败告警 ────────────────────────────────────
      - name: 管线异常告警
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "⚠️  推荐管线执行异常，但网页报告步骤已尝试执行"
          echo "请检查上方日志排查 API/网络问题"

      - name: 推送异常告警
        if: steps.git_push.outcome == 'failure'
        run: |
          echo "⚠️  git push 最终失败，请检查 GitHub 连接或手动推送"
