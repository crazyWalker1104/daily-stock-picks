name: 每日A股推荐推送

on:
  schedule:
    # 每个交易日 8:30 CST (0:30 UTC) — 盘前预跑
    # 注意：GitHub Actions cron 使用 UTC时间 (CST = UTC+8)
    - cron: '30 0 * * 1-5'
    # 每个交易日 9:35 CST (1:35 UTC) — 开盘后补充运行
    # push2.eastmoney.com 开盘前大面积断连，9:30 后数据就绪
    - cron: '35 1 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，留空使用今天'
        required: false
        default: ''

# 必须显式声明写入权限，否则 git push 会失败
permissions:
  contents: write

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查交易日
        id: check_trading
        run: |
          python -c "
          from datetime import datetime
          try:
              import akshare as ak
              df = ak.tool_trade_date_hist_sina()
              today = datetime.now().strftime('%Y-%m-%d')
              # 修复1: .astype(str) 只用于过滤不改变原列类型，取 .values 时仍是 datetime64
              # 需显式转为字符串再做 in 比较
              trade_dates = df['trade_date'].astype(str).values
              recent_dates = [d for d in trade_dates if d.startswith(today[:7])]
              is_trading = today in recent_dates
              # 修复2: Python bool str() 输出 True/False（大写），GitHub Actions 条件比较用小写 true/false
              print(f'TRADING_DAY={str(is_trading).lower()}')
              print(f'DATE={today}')
          except Exception as e:
              print(f'交易日检查失败: {e}，默认执行')
              print('TRADING_DAY=true')
              print(f'DATE={datetime.now().strftime(\"%Y-%m-%d\")}')
          " > trading_check.txt
          cat trading_check.txt
          cat trading_check.txt >> $GITHUB_OUTPUT

      - name: 运行推荐系统
        if: steps.check_trading.outputs.TRADING_DAY == 'true' || github.event_name == 'workflow_dispatch'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WECHAT_SENDKEY: ${{ secrets.WECHAT_SENDKEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.main --date "${{ github.event.inputs.date }}"
          else
            python -m src.main
          fi

      - name: 提交网页报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 拉取远程最新代码并 rebase 本地提交
          git fetch origin main
          git rebase origin/main || git rebase --abort

          # 添加 docs 和 output 目录变更
          git add docs/ output/

          if git diff --cached --quiet; then
            echo "无变更，跳过提交"
          else
            git commit -m "📊 更新每日A股速递 [${{ steps.check_trading.outputs.DATE }}]" || {
              echo "提交失败，检查是否有变更"
              exit 1
            }
            git push origin main || {
              echo "推送失败，尝试重新拉取"
              git pull --rebase origin main
              git push origin main
            }
          fi

      - name: 失败告警
        if: failure()
        run: |
          echo "推荐系统执行失败，请检查日志"
