# 每日A股推荐系统 - 配置模板
# 复制为 config.yaml 并填入真实值

# AI 模型配置
ai:
  provider: deepseek  # deepseek | anthropic
  model: deepseek-chat
  max_tokens: 2000
  temperature: 0.3  # 低温度保证输出稳定

# 信息源开关（可按需关闭不稳定源）
sources:
  cls: false         # 财联社（API频繁变更，不稳定）
  eastmoney: true    # 东方财富
  xueqiu: false      # 雪球（默认关闭，需额外配置cookie）
  sina: true         # 新浪财经

# 推送配置
push:
  email:
    enabled: true
  wechat:
    enabled: false
    provider: serverchan  # serverchan | wecombot (预留企业微信Bot)
  cli:
    enabled: true
  web:
    enabled: true    # GitHub Pages

# 爬虫配置
scraper:
  request_delay: 2   # 请求间隔（秒）
  timeout: 15        # 请求超时（秒）
  max_retries: 3     # 最大重试次数

# 输出配置
output:
  max_recommendations: 5
  save_raw_data: true  # 是否保存原始采集数据

# 技术面过滤配置 (Phase 2.2)
technical_filter:
  enabled: true
  min_turnover_rate: 0.5         # 最低换手率%(低于标记低流动性)
  small_cap_threshold_yi: 20     # 小盘股阈值(亿)
  micro_cap_threshold_yi: 5      # 微盘股阈值(亿)
  limit_up_threshold: 9.5        # 接近涨停线%(主板)
  limit_up_threshold_gem: 19.5   # 接近涨停线%(创业板/科创板)
  consecutive_rise_warning: 3    # 连涨N天 → 警告
  consecutive_rise_exclude: 5    # 连涨N天 → 排除
  volume_surge_ratio: 2.0        # 放量倍数(相对5日均量)
  volume_shrink_ratio: 0.3       # 缩量比例(相对5日均量)
  use_akshare_enhancement: true  # 是否使用akshare K线增强

# SQLite 推荐数据库 (Phase 3.1)
database:
  enabled: true               # 是否启用数据库存储（关闭后管道跳过所有DB操作）
  path: data/recommendations.db  # 相对项目根目录的数据库文件路径
  migrate_on_start: true      # 首次运行时自动导入已有的JSON报告
